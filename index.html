<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(270deg, #0f0c29, #302b63, #24243e);
  background-size: 600% 600%;
  animation: bgMove 10s ease infinite;
}

/* حركة الخلفية */
@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* نجوم */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveStars 40s linear infinite;
  opacity: 0.2;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}

/* محتوى */
.container {
  margin-top: 120px;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 50px;
  color: #bb86fc;
  text-shadow: 0 0 20px #bb86fc, 0 0 40px #7a00ff;
}

p {
  font-size: 18px;
  color: #ddd;
}

/* أزرار */
.btn {
  display: inline-block;
  margin: 15px;
  padding: 15px 35px;
  border-radius: 15px;
  font-size: 18px;
  text-decoration: none;
  transition: 0.3s;
}

/* واتساب */
.whatsapp {
  background: linear-gradient(135deg, #25D366, #128C7E);
}

/* تلغرام */
.telegram {
  background: linear-gradient(135deg, #0088cc, #00c6ff);
}

/* تأثير hover */
.btn:hover {
  transform: scale(1.12);
  box-shadow: 0 0 30px white;
}

/* تأثير خطوط نيون */
.glow-line {
  width: 200px;
  height: 3px;
  margin: 20px auto;
  background: linear-gradient(90deg, transparent, #bb86fc, transparent);
  animation: glowMove 3s infinite;
}

@keyframes glowMove {
  0% {opacity: 0;}
  50% {opacity: 1;}
  100% {opacity: 0;}
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h1>🔥 Realm Store 🔥</h1>
  <div class="glow-line"></div>
  <p>أفضل متجر حسابات Blox Fruits و Bounty Rush</p>

  <a href="https://wa.me/966562585336" target="_blank" class="btn whatsapp">
    💬 واتساب
  </a>

  <a href="https://t.me/+CEsvry-8hAgxNWRk" target="_blank" class="btn telegram">
    🚀 تلغرام
  </a>
</div>

</body>
</html>
